<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz 18+</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      min-height: 100dvh;
      background: #000;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: #000;
      padding: 0 24px;
    }

    /* BARRA DE PROGRESSO — com respiro do topo */
    .progress-wrap {
      position: fixed;
      top: 12px;
      left: 20px;
      right: 20px;
      height: 5px;
      background: #2a2a2a;
      border-radius: 99px;
      z-index: 999;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 4%;
      background: #c0121e;
      border-radius: 99px;
    }

    /* CONTEÚDO */
    #wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 420px;
      text-align: center;
      gap: 22px;
      animation: fadeUp .5s ease both;
    }

    .logo {
      width: 180px;
      max-width: 60vw;
      height: auto;
      display: block;
    }

    /* Conteúdo 18+ texto */
    .title {
      font-size: 1.7rem;
      font-weight: 900;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .badge {
      background: #c0121e;
      color: #fff;
      font-size: .85rem;
      font-weight: 900;
      padding: 4px 9px;
      border-radius: 6px;
    }

    .aviso {
      font-size: 1.35rem;
      font-weight: 900;
      line-height: 1.4;
      color: #fff;
    }

    /* BOTÃO — vermelho escuro, relevo 3D, pulsar leve */
    .btn {
      width: 100%;
      padding: 20px;
      background: #b81020;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: .92rem;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow:
        0 7px 0 #7a0a15,
        0 10px 20px rgba(0,0,0,.5);
      animation: pulsar 2.4s ease-in-out infinite;
      transition: transform .1s, box-shadow .1s;
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #7a0a15, 0 4px 8px rgba(0,0,0,.4);
    }

    @keyframes pulsar {
      0%, 100% { box-shadow: 0 7px 0 #7a0a15, 0 10px 22px rgba(180,10,25,.3); }
      50%       { box-shadow: 0 7px 0 #7a0a15, 0 10px 30px rgba(180,10,25,.55); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="progress-wrap">
    <div class="progress-fill"></div>
  </div>

  <div id="wrap">
    <img class="logo"
      src="https://doram.shop/wp-content/uploads/2026/03/lg-QOQjf-gemini-generated-image-rnsg4trnsg4trnsg.webp"
      alt="Logo"/>

    <p class="aviso">
      Você deve ter 18 anos ou mais<br>para continuar!
    </p>

    <button class="btn" onclick="confirmar()">
      TENHO 18 ANOS OU MAIS!
    </button>
  </div>

  <script>
    function confirmar() {
      // próxima tela será conectada aqui
    }
  </script>
</body>
</html>
